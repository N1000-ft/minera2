services:
  - type: web
    name: minera2
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
